<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grades - College Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>College MS</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="students.html">Students</a></li>
                <li><a href="teachers.html">Teachers</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="attendance.html">Attendance</a></li>
                <li><a href="grades.html" class="active">Grades</a></li>
                <li><a href="fees.html">Fees</a></li>
                <li><a href="#" id="logoutBtn">Logout</a></li>
            </ul>
        </nav>
        <div class="main-content">
            <header>
                <h1>Grade Management</h1>
            </header>
            
            <div class="grade-controls teacher-only">
                <h3>Add/Update Grades</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Select Course:</label>
                        <select id="gradeCourseSelect" onchange="loadGradeStudents()">
                            <option value="">Select a course</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Select Student:</label>
                        <select id="gradeStudentSelect">
                            <option value="">Select a student</option>
                        </select>
                    </div>
                </div>
                <div id="gradeForm" style="display:none;">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Internal Marks (0-50):</label>
                            <input type="number" id="internalMarks" min="0" max="50">
                        </div>
                        <div class="form-group">
                            <label>External Marks (0-50):</label>
                            <input type="number" id="externalMarks" min="0" max="50">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Remarks:</label>
                        <textarea id="gradeRemarks"></textarea>
                    </div>
                    <button class="btn btn-primary" onclick="saveGrade()">Save Grade</button>
                </div>
            </div>
            
            <div class="grade-reports">
                <h3>Student Grades</h3>
                <div class="form-group">
                    <label>Select Student:</label>
                    <select id="reportStudentSelect" onchange="loadStudentGrades()">
                        <option value="">Select a student</option>
                    </select>
                </div>
                <div id="gradeSummary"></div>
                <div class="table-container">
                    <table id="gradesTable">
                        <thead>
                            <tr>
                                <th>Course Code</th>
                                <th>Course Name</th>
                                <th>Internal</th>
                                <th>External</th>
                                <th>Total</th>
                                <th>Grade</th>
                            </tr>
                        </thead>
                        <tbody id="gradesList"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/grades.js"></script>
</body>
</html>
