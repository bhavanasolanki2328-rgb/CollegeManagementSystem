<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <h1>College Management System</h1>
                    <p>Loading...</p>
                </div>
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <p id="statusMessage">Checking system setup...</p>
                </div>
            </div>
        </div>
    </div>

    <style>
        .loading-spinner {
            text-align: center;
            padding: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 15px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #statusMessage {
            color: #666;
            font-size: 14px;
        }
    </style>

    <script>
        const API_URL = 'http://localhost:5000/api';

        async function checkAdminExists() {
            try {
                const response = await fetch(`${API_URL}/auth/check-admin-exists`);
                const data = await response.json();

                const statusMsg = document.getElementById('statusMessage');

                if (data.adminExists) {
                    // Admin exists - redirect to login
                    statusMsg.textContent = 'Admin found! Redirecting to login...';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1000);
                } else {
                    // No admin exists - redirect to register-admin
                    statusMsg.textContent = 'No admin found! Redirecting to registration...';
                    setTimeout(() => {
                        window.location.href = 'register-admin.html';
                    }, 1000);
                }
            } catch (error) {
                console.error('Error checking admin:', error);
                document.getElementById('statusMessage').innerHTML = '⚠️ Could not connect to server. Please make sure backend is running.<br>Backend URL: ' + API_URL;
            }
        }

        // Run the check when page loads
        checkAdminExists();
    </script>
</body>

</html>
