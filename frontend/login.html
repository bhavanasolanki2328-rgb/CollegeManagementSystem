<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - College Management System</title>
    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-wrapper {
            text-align: center;
        }

        .tagline {
            color: white;
            margin-bottom: 20px;
        }

        .tagline h2 {
            margin: 0;
            font-weight: 500;
        }

        .tagline p {
            margin-top: 5px;
            font-size: 14px;
            opacity: 0.9;
        }

        .login-card {
            background: #fff;
            padding: 35px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .login-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .login-header h1 {
            font-size: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        label {
            font-size: 14px;
            color: #444;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-top: 5px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #667eea;
            color: white;
            cursor: pointer;
        }

        .btn:hover {
            background: #5a67d8;
        }

        .error-message {
            color: red;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="login-wrapper">

    
    <div class="tagline">
        <h2>Welcome to CMS Portal 🎓</h2>
        <p>Manage students, faculty, and resources — all in one place</p>
    </div>

    <div class="login-card">
        <div class="login-header">
            <h1>Login</h1>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label> Your Id</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>

            <button type="submit" class="btn">Login</button>
        </form>

        <div id="errorMessage" class="error-message" style="margin-top: 10px;"></div>
    </div>

</div>

<script src="js/auth.js"></script>
</body>
</html>
