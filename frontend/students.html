<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students - College Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="sidebar-header"><h2>College MS</h2></div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="students.html" class="active">Students</a></li>
                <li><a href="teachers.html">Teachers</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="attendance.html">Attendance</a></li>
                <li><a href="grades.html">Grades</a></li>
                <li><a href="fees.html">Fees</a></li>
                <li><a href="#" id="logoutBtn">Logout</a></li>
            </ul>
        </nav>
        <div class="main-content">
            <header>
                <h1>Student Management</h1>
                <button class="btn btn-primary" onclick="showAddModal()">Add New Student</button>
            </header>
            <div class="table-container">
                <table>
                    <thead><tr><th>Roll Number</th><th>Name</th><th>Email</th><th>Department</th><th>Semester</th><th>Actions</th></tr></thead>
                    <tbody id="studentsList"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div id="studentModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Add Student</h2>
            <form id="studentForm">
                <input type="text" id="name" placeholder="Full Name" required><br><br>
                <input type="email" id="email" placeholder="Email" required><br><br>
                <input type="password" id="password" placeholder="Password" required><br><br>
                <input type="text" id="rollNumber" placeholder="Roll Number" required><br><br>
                <select id="department" required>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Electronics">Electronics</option>
                </select><br><br>
                <input type="number" id="semester" placeholder="Semester" required><br><br>
                <button type="submit" class="btn btn-primary">Save</button>
            </form>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
    <script>
        const token = localStorage.getItem('token');
        
        async function loadStudents() {
            const res = await fetch('http://localhost:5000/api/students', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const students = await res.json();
            const tbody = document.getElementById('studentsList');
            tbody.innerHTML = students.map(s => `
                <tr>
                    <td>${s.rollNumber}</td>
                    <td>${s.userId?.name}</td>
                    <td>${s.userId?.email}</td>
                    <td>${s.department}</td>
                    <td>${s.semester}</td>
                    <td><button class="btn btn-sm btn-danger" onclick="deleteStudent('${s._id}')">Delete</button></td>
                </tr>
            `).join('');
        }
        
        async function deleteStudent(id) {
            if(confirm('Delete?')) {
                await fetch(`http://localhost:5000/api/students/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                loadStudents();
            }
        }
        
        function showAddModal() {
            document.getElementById('studentModal').style.display = 'block';
        }
        
        function closeModal() {
            document.getElementById('studentModal').style.display = 'none';
        }
        
        document.getElementById('studentForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                rollNumber: document.getElementById('rollNumber').value,
                department: document.getElementById('department').value,
                semester: parseInt(document.getElementById('semester').value)
            };
            await fetch('http://localhost:5000/api/students', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(data)
            });
            closeModal();
            loadStudents();
        });
        
        loadStudents();
    </script>
</body>
</html>
