<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance - Teacher</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .attendance-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .attendance-table th, .attendance-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .attendance-table th {
            background: #667eea;
            color: white;
        }
        .attendance-table tr:hover {
            background: #f5f5f5;
        }
        .radio-group {
            display: flex;
            gap: 15px;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        .radio-present { color: #28a745; }
        .radio-absent { color: #dc3545; }
        .radio-late { color: #ffc107; }
        .btn-group {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .success-msg {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }
        .stats-bar {
            background: #f0f7ff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        .filter-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        @media (max-width: 768px) {
            .filter-row {
                grid-template-columns: 1fr;
            }
        }
        .debug-box {
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            margin-top: 15px;
            font-size: 12px;
            font-family: monospace;
            display: none;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="sidebar-header"><h2>Teacher Portal</h2></div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="courses.html">My Courses</a></li>
                <li><a href="attendance.html" class="active">Mark Attendance</a></li>
                <li><a href="grades.html">Enter Grades</a></li>
                <li><a href="resources.html">Upload Resources</a></li>
                <li><a href="#" id="logoutBtn">Logout</a></li>
            </ul>
        </nav>
        <div class="main-content">
            <header>
                <h1>📝 Mark Attendance</h1>
                <div class="user-info">
                    <span id="userName"></span>
                    <span id="userRole" class="role-badge">Teacher</span>
                </div>
            </header>
            
            <div class="dashboard-card">
                <div id="successMsg" class="success-msg">✅ Attendance saved successfully!</div>
                
                <div class="filter-row">
                    <div class="form-group">
                        <label>📚 Select Course *</label>
                        <select id="courseSelect" required>
                            <option value="">-- Select Course --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>📅 Select Date *</label>
                        <input type="date" id="attendanceDate" required>
                    </div>
                </div>
                
                <div class="filter-row">
                    <div class="form-group">
                        <label>🏛️ Select Department *</label>
                        <select id="departmentSelect" required>
                            <option value="">-- Select Department --</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Information Technology">Information Technology</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Mechanical">Mechanical</option>
                            <option value="Civil">Civil</option>
                            <option value="Electrical">Electrical</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>📚 Select Semester *</label>
                        <select id="semesterSelect" required>
                            <option value="">-- Select Semester --</option>
                            <option value="1">1st Semester</option>
                            <option value="2">2nd Semester</option>
                            <option value="3">3rd Semester</option>
                            <option value="4">4th Semester</option>
                            <option value="5">5th Semester</option>
                            <option value="6">6th Semester</option>
                            <option value="7">7th Semester</option>
                            <option value="8">8th Semester</option>
                        </select>
                    </div>
                </div>
                
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="loadStudents()">🔍 Load Students</button>
                    <button class="btn btn-success" onclick="markAllPresent()" style="background: #28a745;">✅ Mark All Present</button>
                    <button class="btn btn-warning" onclick="markAllAbsent()" style="background: #ffc107; color: #333;">❌ Mark All Absent</button>
                </div>
                
                <div id="studentsContainer">
                    <div class="empty-state">
                        <div class="empty-state-icon">👥</div>
                        <h4>No Students Loaded</h4>
                        <p>Select department, semester, and click "Load Students" to start marking attendance.</p>
                    </div>
                </div>
                
                <div id="debugBox" class="debug-box"></div>
                
                <div style="text-align: center; margin-top: 20px;">
                    <button class="btn btn-primary" onclick="saveAttendance()" style="background: #28a745; font-size: 16px; padding: 12px 30px;">💾 Save Attendance</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="../js/auth.js"></script>
    <script>
        const API_URL = 'http://localhost:5000/api';
        const token = localStorage.getItem('token');
        const user = getCurrentUser();
        let studentsList = [];
        
        document.getElementById('attendanceDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('userName').textContent = user.name || 'Teacher';
        setupLogout();
        
        // Load teacher's courses
        async function loadTeacherCourses() {
            try {
                const res = await fetch(`${API_URL}/courses`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                if (res.ok) {
                    const courses = await res.json();
                    const courseSelect = document.getElementById('courseSelect');
                    courseSelect.innerHTML = '<option value="">-- Select Course --</option>' + 
                        courses.map(c => `<option value="${c._id}">${c.courseName} (${c.courseCode}) - Sem ${c.semester}</option>`).join('');
                } else {
                    console.error('Failed to load courses');
                }
            } catch (error) {
                console.error('Error loading courses:', error);
            }
        }
        
        // Load students based on department and semester
        async function loadStudents() {
            const department = document.getElementById('departmentSelect').value;
            const semester = document.getElementById('semesterSelect').value;
            const debugBox = document.getElementById('debugBox');
            
            if (!department) {
                alert('Please select a department');
                return;
            }
            if (!semester) {
                alert('Please select a semester');
                return;
            }
            
            document.getElementById('studentsContainer').innerHTML = '<div class="loading">⏳ Loading students...</div>';
            debugBox.style.display = 'block';
            debugBox.innerHTML = 'Fetching students...';
            
            try {
                // First, get all students
                const res = await fetch(`${API_URL}/students`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                
                if (res.ok) {
                    const allStudents = await res.json();
                    debugBox.innerHTML = `Total students in DB: ${allStudents.length}<br>`;
                    debugBox.innerHTML += `Sample student: ${JSON.stringify(allStudents[0], null, 2)}<br>`;
                    
                    // Filter students by department and semester
                    studentsList = allStudents.filter(s => {
                        const matchDept = s.department === department;
                        const matchSem = s.semester === parseInt(semester);
                        debugBox.innerHTML += `Student: ${s.userId?.name}, Dept: ${s.department}, Sem: ${s.semester} → Match: ${matchDept && matchSem}<br>`;
                        return matchDept && matchSem;
                    });
                    
                    console.log('Filtered students:', studentsList);
                    debugBox.innerHTML += `<br>✅ Filtered students: ${studentsList.length}`;
                    
                    if (studentsList.length === 0) {
                        document.getElementById('studentsContainer').innerHTML = `
                            <div class="empty-state">
                                <div class="empty-state-icon">👥</div>
                                <h4>No Students Found</h4>
                                <p>No students found in <strong>${department}</strong> department for <strong>${semester} semester</strong>.</p>
                                <p>Please make sure students are registered with correct department and semester.</p>
                                <p style="font-size: 12px; margin-top: 10px;">Check debug box above for details.</p>
                            </div>
                        `;
                        return;
                    }
                    
                    displayStudentsTable();
                } else {
                    throw new Error('Failed to fetch students');
                }
            } catch (error) {
                console.error('Error loading students:', error);
                document.getElementById('studentsContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <h4>Error Loading Students</h4>
                        <p>Could not load students. Error: ${error.message}</p>
                    </div>
                `;
            }
        }
        
        function displayStudentsTable() {
            const html = `
                <div class="stats-bar">
                    <div class="stat-item"><span class="stat-number">${studentsList.length}</span><br>Total Students</div>
                    <div class="stat-item"><span class="stat-number" id="presentCount">0</span><br>Present</div>
                    <div class="stat-item"><span class="stat-number" id="absentCount">0</span><br>Absent</div>
                    <div class="stat-item"><span class="stat-number" id="lateCount">0</span><br>Late</div>
                </div>
                <table class="attendance-table">
                    <thead>
                        <tr>
                            <th>Roll Number</th>
                            <th>Student Name</th>
                            <th>Department</th>
                            <th>Semester</th>
                            <th>Attendance Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${studentsList.map((student) => `
                            <tr>
                                <td>${student.rollNumber || 'N/A'}</td>
                                <td>${student.userId?.name || student.name || 'N/A'}</td>
                                <td>${student.department || 'N/A'}</td>
                                <td>${student.semester || 'N/A'}</td>
                                <td>
                                    <div class="radio-group">
                                        <label class="radio-present">
                                            <input type="radio" name="attendance_${student._id}" value="present" onchange="updateStats()"> ✅ Present
                                        </label>
                                        <label class="radio-absent">
                                            <input type="radio" name="attendance_${student._id}" value="absent" onchange="updateStats()"> ❌ Absent
                                        </label>
                                        <label class="radio-late">
                                            <input type="radio" name="attendance_${student._id}" value="late" onchange="updateStats()"> ⏰ Late
                                        </label>
                                    </div>
                                 </div>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('studentsContainer').innerHTML = html;
            updateStats();
        }
        
        function updateStats() {
            let present = 0, absent = 0, late = 0;
            studentsList.forEach(student => {
                const selected = document.querySelector(`input[name="attendance_${student._id}"]:checked`);
                if (selected) {
                    if (selected.value === 'present') present++;
                    else if (selected.value === 'absent') absent++;
                    else if (selected.value === 'late') late++;
                }
            });
            const presentEl = document.getElementById('presentCount');
            const absentEl = document.getElementById('absentCount');
            const lateEl = document.getElementById('lateCount');
            if (presentEl) presentEl.textContent = present;
            if (absentEl) absentEl.textContent = absent;
            if (lateEl) lateEl.textContent = late;
        }
        
        function markAllPresent() {
            studentsList.forEach(student => {
                const radio = document.querySelector(`input[name="attendance_${student._id}"][value="present"]`);
                if (radio) radio.checked = true;
            });
            updateStats();
        }
        
        function markAllAbsent() {
            studentsList.forEach(student => {
                const radio = document.querySelector(`input[name="attendance_${student._id}"][value="absent"]`);
                if (radio) radio.checked = true;
            });
            updateStats();
        }
        
        async function saveAttendance() {
            const courseId = document.getElementById('courseSelect').value;
            const date = document.getElementById('attendanceDate').value;
            
            if (!courseId) {
                alert('Please select a course');
                return;
            }
            if (!date) {
                alert('Please select a date');
                return;
            }
            
            const records = [];
            studentsList.forEach(student => {
                const selected = document.querySelector(`input[name="attendance_${student._id}"]:checked`);
                records.push({
                    studentId: student._id,
                    status: selected ? selected.value : 'absent'
                });
            });
            
            if (records.length === 0) {
                alert('No students to mark attendance for');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/attendance`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        Authorization: `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        courseId: courseId,
                        date: date,
                        records: records
                    })
                });
                
                if (response.ok) {
                    const successMsg = document.getElementById('successMsg');
                    successMsg.style.display = 'block';
                    setTimeout(() => {
                        successMsg.style.display = 'none';
                    }, 3000);
                } else {
                    const error = await response.json();
                    alert('Error saving attendance: ' + (error.error || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error saving attendance. Please try again.');
            }
        }
        
        // Initialize
        loadTeacherCourses();
    </script>
</body>
</html>
