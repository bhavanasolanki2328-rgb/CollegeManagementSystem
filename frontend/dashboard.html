<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - College Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>College MS</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html" class="active">Dashboard</a></li>
                <li class="admin-only"><a href="students.html">Students</a></li>
                <li class="admin-only"><a href="teachers.html">Teachers</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li class="teacher-only"><a href="attendance.html">Attendance</a></li>
                <li class="teacher-only"><a href="grades.html">Grades</a></li>
                <li class="admin-only"><a href="fees.html">Fees</a></li>
                <li><a href="#" id="logoutBtn">Logout</a></li>
            </ul>
        </nav>
        <div class="main-content">
            <header>
                <h1>Dashboard</h1>
                <div class="user-info">
                    <span id="userName"></span>
                    <span id="userRole" class="role-badge"></span>
                </div>
            </header>
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <h3>Loading...</h3>
                    <div class="stat-value">-</div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script>
        const token = localStorage.getItem('token');
        
        async function loadStats() {
            try {
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                
                if (user.role === 'admin') {
                    const studentsRes = await fetch('http://localhost:5000/api/students', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const teachersRes = await fetch('http://localhost:5000/api/teachers', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const coursesRes = await fetch('http://localhost:5000/api/courses', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    
                    const students = await studentsRes.json();
                    const teachers = await teachersRes.json();
                    const courses = await coursesRes.json();
                    
                    document.getElementById('statsGrid').innerHTML = `
                        <div class="stat-card"><h3>Total Students</h3><div class="stat-value">${students.length || 0}</div><div style="font-size:30px;">👨‍🎓</div></div>
                        <div class="stat-card"><h3>Total Teachers</h3><div class="stat-value">${teachers.length || 0}</div><div style="font-size:30px;">👨‍🏫</div></div>
                        <div class="stat-card"><h3>Total Courses</h3><div class="stat-value">${courses.length || 0}</div><div style="font-size:30px;">📚</div></div>
                    `;
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        loadStats();
    </script>
</body>
</html>
