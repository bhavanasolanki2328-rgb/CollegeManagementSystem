<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Courses</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="sidebar-header"><h2>Admin Portal</h2></div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="students.html">Students</a></li>
                <li><a href="teachers.html">Teachers</a></li>
                <li><a href="courses.html" class="active">Courses</a></li>
                <li><a href="#" id="logoutBtn">Logout</a></li>
            </ul>
        </nav>
        <div class="main-content">
            <header>
                <h1>Course Management</h1>
                <button class="btn btn-primary" onclick="showAddModal()">Add New Course</button>
            </header>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Course Code</th>
                            <th>Course Name</th>
                            <th>Department</th>
                            <th>Semester</th>
                            <th>Credits</th>
                            <th>Teacher</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="coursesList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="courseModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Add/Edit Course</h2>
            <form id="courseForm">
                <div class="form-row">
                    <div class="form-group"><label>Course Code</label><input type="text" id="courseCode" required></div>
                    <div class="form-group"><label>Course Name</label><input type="text" id="courseName" required></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Department</label><select id="department"><option value="Computer Science">CS</option><option value="Electronics">EC</option><option value="Mechanical">ME</option></select></div>
                    <div class="form-group"><label>Semester</label><input type="number" id="semester" min="1" max="8" required></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Credits</label><input type="number" id="credits" min="1" max="6" required></div>
                    <div class="form-group"><label>Teacher (Optional)</label><select id="teacherId"><option value="">Select Teacher</option></select></div>
                </div>
                <div class="form-group"><label>Description</label><textarea id="description" rows="2"></textarea></div>
                <button type="submit" class="btn btn-primary">Save Course</button>
            </form>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        let editingId = null;
        const token = localStorage.getItem('token');
        let teachersList = [];

        async function loadTeachersForSelect() {
            const res = await fetch('http://localhost:5000/api/teachers', { headers: { Authorization: `Bearer ${token}` } });
            teachersList = await res.json();
            const select = document.getElementById('teacherId');
            select.innerHTML = '<option value="">Select Teacher</option>' + teachersList.map(t => `<option value="${t._id}">${t.userId?.name} (${t.department})</option>`).join('');
        }

        async function loadCourses() {
            const res = await fetch('http://localhost:5000/api/courses', { headers: { Authorization: `Bearer ${token}` } });
            const courses = await res.json();
            document.getElementById('coursesList').innerHTML = courses.map(c => {
                const teacher = teachersList.find(t => t._id === c.teacherId);
                return `<tr>
                    <td>${c.courseCode}</td>
                    <td>${c.courseName}</td>
                    <td>${c.department}</td>
                    <td>${c.semester}</td>
                    <td>${c.credits}</td>
                    <td>${teacher?.userId?.name || 'Not Assigned'}</td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="editCourse('${c._id}')">Edit</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteCourse('${c._id}')">Delete</button>
                    </td>
                </tr>`;
            }).join('');
        }

        async function deleteCourse(id) {
            if(confirm('Delete this course?')) {
                await fetch(`http://localhost:5000/api/courses/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
                loadCourses();
            }
        }

        async function editCourse(id) {
            const res = await fetch(`http://localhost:5000/api/courses/${id}`, { headers: { Authorization: `Bearer ${token}` } });
            const c = await res.json();
            editingId = id;
            document.getElementById('courseCode').value = c.courseCode;
            document.getElementById('courseName').value = c.courseName;
            document.getElementById('department').value = c.department;
            document.getElementById('semester').value = c.semester;
            document.getElementById('credits').value = c.credits;
            document.getElementById('teacherId').value = c.teacherId || '';
            document.getElementById('description').value = c.description || '';
            document.getElementById('courseModal').style.display = 'block';
        }

        function showAddModal() { editingId = null; document.getElementById('courseForm').reset(); document.getElementById('courseModal').style.display = 'block'; }
        function closeModal() { document.getElementById('courseModal').style.display = 'none'; }

        document.getElementById('courseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                courseCode: document.getElementById('courseCode').value,
                courseName: document.getElementById('courseName').value,
                department: document.getElementById('department').value,
                semester: parseInt(document.getElementById('semester').value),
                credits: parseInt(document.getElementById('credits').value),
                teacherId: document.getElementById('teacherId').value || null,
                description: document.getElementById('description').value
            };
            const url = editingId ? `http://localhost:5000/api/courses/${editingId}` : 'http://localhost:5000/api/courses';
            const method = editingId ? 'PUT' : 'POST';
            await fetch(url, { method, headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` }, body: JSON.stringify(data) });
            closeModal();
            loadCourses();
        });

        (async () => {
            await loadTeachersForSelect();
            await loadCourses();
        })();
    </script>
</body>
</html>
