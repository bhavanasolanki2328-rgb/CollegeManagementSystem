<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="sidebar-header"><h2>Admin Portal</h2></div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html" class="active">Dashboard</a></li>
                <li><a href="students.html">Students</a></li>
                <li><a href="teachers.html">Teachers</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="#" id="logoutBtn">Logout</a></li>
            </ul>
        </nav>
        <div class="main-content">
            <header>
                <h1>Admin Dashboard</h1>
                <div class="user-info"><span id="userName"></span><span id="userRole" class="role-badge">Admin</span></div>
            </header>
            <div class="stats-grid">
                <div class="stat-card"><h3>Total Students</h3><div class="stat-value" id="totalStudents">-</div></div>
                <div class="stat-card"><h3>Total Teachers</h3><div class="stat-value" id="totalTeachers">-</div></div>
                <div class="stat-card"><h3>Total Courses</h3><div class="stat-value" id="totalCourses">-</div></div>
            </div>
        </div>
    </div>
    <script src="../js/auth.js"></script>
    <script>
        (async () => {
            const token = localStorage.getItem('token');
            try {
                const [students, teachers, courses] = await Promise.all([
                    fetch('http://localhost:5000/api/students', { headers: { Authorization: `Bearer ${token}` } }).then(r => r.json()),
                    fetch('http://localhost:5000/api/teachers', { headers: { Authorization: `Bearer ${token}` } }).then(r => r.json()),
                    fetch('http://localhost:5000/api/courses', { headers: { Authorization: `Bearer ${token}` } }).then(r => r.json())
                ]);
                document.getElementById('totalStudents').innerText = students.length;
                document.getElementById('totalTeachers').innerText = teachers.length;
                document.getElementById('totalCourses').innerText = courses.length;
            } catch(e) { console.error(e); }
        })();
    </script>
</body>
</html>
