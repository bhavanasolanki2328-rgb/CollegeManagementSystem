<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fee Status</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="sidebar-header"><h2>Student Portal</h2></div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="attendance.html">Attendance</a></li>
                <li><a href="grades.html">Grades</a></li>
                <li><a href="resources.html">Resources</a></li>
                <li><a href="timetable.html">Timetable</a></li>
                <li><a href="fees.html" class="active">Fees</a></li>
                <li><a href="#" id="logoutBtn">Logout</a></li>
            </ul>
        </nav>
        <div class="main-content">
            <header><h1>Fee Status</h1><div class="user-info"><span id="userName"></span><span id="userRole" class="role-badge">Student</span></div></header>
            <div class="dashboard-card" id="feesContainer">
                <div class="empty-state"><div class="empty-state-icon">💰</div><h4>No Fee Records</h4><p>Your fee details will appear here once updated.</p></div>
            </div>
        </div>
    </div>
    <script src="../js/auth.js"></script>
    <script>
        (async () => {
            const token = localStorage.getItem('token');
            const user = getCurrentUser();
            try {
                const studentRes = await fetch(`http://localhost:5000/api/students/email/${user.email}`, { headers: { Authorization: `Bearer ${token}` } });
                if(studentRes.ok) {
                    const student = await studentRes.json();
                    const feeRes = await fetch(`http://localhost:5000/api/fees/student/${student._id}`, { headers: { Authorization: `Bearer ${token}` } });
                    if(feeRes.ok) {
                        const data = await feeRes.json();
                        if(data.summary?.totalFee) {
                            const percent = (data.summary.totalPaid / data.summary.totalFee) * 100;
                            document.getElementById('feesContainer').innerHTML = `
                                <div class="fee-status"><div class="fee-amount">Total: ₹${data.summary.totalFee.toLocaleString()}</div>
                                <div class="fee-amount fee-paid">Paid: ₹${data.summary.totalPaid.toLocaleString()}</div>
                                <div class="fee-amount fee-due">Due: ₹${data.summary.totalDue.toLocaleString()}</div>
                                <div class="attendance-bar"><div class="attendance-fill" style="width:${percent}%; background:#28a745;">${percent.toFixed(1)}%</div></div></div>
                                <h3>Payment History</h3><table>${data.fees?.flatMap(f => f.paymentHistory.map(p => `<tr><td>${new Date(p.date).toLocaleDateString()}</td><td>₹${p.amount}</td><td>${p.mode}</td><td>${p.receiptNumber}</td></tr>`)).join('') || '<tr><td colspan="4">No payments</td></tr>'}</table>
                            `;
                        }
                    }
                }
            } catch(e) { console.error(e); }
        })();
    </script>
</body>
</html>
