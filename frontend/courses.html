<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - College Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="sidebar-header"><h2>College MS</h2></div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="students.html">Students</a></li>
                <li><a href="teachers.html">Teachers</a></li>
                <li><a href="courses.html" class="active">Courses</a></li>
                <li><a href="attendance.html">Attendance</a></li>
                <li><a href="grades.html">Grades</a></li>
                <li><a href="fees.html">Fees</a></li>
                <li><a href="#" id="logoutBtn">Logout</a></li>
            </ul>
        </nav>
        <div class="main-content">
            <header>
                <h1>Course Management</h1>
                <button class="btn btn-primary" onclick="showAddModal()">Add New Course</button>
            </header>
            <div class="table-container">
                <table>
                    <thead><tr><th>Course Code</th><th>Course Name</th><th>Department</th><th>Semester</th><th>Credits</th><th>Actions</th></tr></thead>
                    <tbody id="coursesList"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div id="courseModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Add Course</h2>
            <form id="courseForm">
                <input type="text" id="courseCode" placeholder="Course Code" required><br><br>
                <input type="text" id="courseName" placeholder="Course Name" required><br><br>
                <select id="department" required>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Electronics">Electronics</option>
                </select><br><br>
                <input type="number" id="semester" placeholder="Semester" required><br><br>
                <input type="number" id="credits" placeholder="Credits" required><br><br>
                <button type="submit" class="btn btn-primary">Save</button>
            </form>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
    <script>
        const token = localStorage.getItem('token');
        
        async function loadCourses() {
            const res = await fetch('http://localhost:5000/api/courses', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const courses = await res.json();
            const tbody = document.getElementById('coursesList');
            tbody.innerHTML = courses.map(c => `
                <tr>
                    <td>${c.courseCode}</td>
                    <td>${c.courseName}</td>
                    <td>${c.department}</td>
                    <td>${c.semester}</td>
                    <td>${c.credits}</td>
                    <td><button class="btn btn-sm btn-danger" onclick="deleteCourse('${c._id}')">Delete</button></td>
                </tr>
            `).join('');
        }
        
        async function deleteCourse(id) {
            if(confirm('Delete?')) {
                await fetch(`http://localhost:5000/api/courses/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                loadCourses();
            }
        }
        
        function showAddModal() {
            document.getElementById('courseModal').style.display = 'block';
        }
        
        function closeModal() {
            document.getElementById('courseModal').style.display = 'none';
        }
        
        document.getElementById('courseForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                courseCode: document.getElementById('courseCode').value,
                courseName: document.getElementById('courseName').value,
                department: document.getElementById('department').value,
                semester: parseInt(document.getElementById('semester').value),
                credits: parseInt(document.getElementById('credits').value)
            };
            await fetch('http://localhost:5000/api/courses', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(data)
            });
            closeModal();
            loadCourses();
        });
        
        loadCourses();
    </script>
</body>
</html>
