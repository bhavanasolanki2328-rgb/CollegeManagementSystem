<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachers - College Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>College MS</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="students.html">Students</a></li>
                <li><a href="teachers.html" class="active">Teachers</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="attendance.html">Attendance</a></li>
                <li><a href="grades.html">Grades</a></li>
                <li><a href="fees.html">Fees</a></li>
                <li><a href="#" id="logoutBtn">Logout</a></li>
            </ul>
        </nav>
        <div class="main-content">
            <header>
                <h1>Teacher Management</h1>
                <button class="btn btn-primary" onclick="showAddTeacherModal()">Add New Teacher</button>
            </header>
            
            <div class="filters">
                <input type="text" id="searchInput" placeholder="Search by name or employee ID..." onkeyup="searchTeachers()">
                <select id="departmentFilter" onchange="filterTeachers()">
                    <option value="">All Departments</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Mechanical">Mechanical</option>
                    <option value="Civil">Civil</option>
                </select>
            </div>
            
            <div class="table-container">
                <table id="teachersTable">
                    <thead>
                        <tr>
                            <th>Employee ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Department</th>
                            <th>Designation</th>
                            <th>Qualification</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="teachersList"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- Add/Edit Teacher Modal -->
    <div id="teacherModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Add New Teacher</h2>
            <form id="teacherForm">
                <input type="hidden" id="teacherId">
                <div class="form-group">
                    <label>Name:</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="password" required>
                </div>
                <div class="form-group">
                    <label>Employee ID:</label>
                    <input type="text" id="employeeId" required>
                </div>
                <div class="form-group">
                    <label>Department:</label>
                    <select id="department" required>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Mechanical">Mechanical</option>
                        <option value="Civil">Civil</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Designation:</label>
                    <input type="text" id="designation">
                </div>
                <div class="form-group">
                    <label>Qualification:</label>
                    <input type="text" id="qualification">
                </div>
                <div class="form-group">
                    <label>Specialization:</label>
                    <input type="text" id="specialization">
                </div>
                <div class="form-group">
                    <label>Phone:</label>
                    <input type="text" id="phone">
                </div>
                <button type="submit" class="btn btn-primary">Save Teacher</button>
            </form>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/teachers.js"></script>
</body>
</html>
