<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachers - College Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="sidebar-header"><h2>College MS</h2></div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="students.html">Students</a></li>
                <li><a href="teachers.html" class="active">Teachers</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="attendance.html">Attendance</a></li>
                <li><a href="grades.html">Grades</a></li>
                <li><a href="fees.html">Fees</a></li>
                <li><a href="#" id="logoutBtn">Logout</a></li>
            </ul>
        </nav>
        <div class="main-content">
            <header>
                <h1>Teacher Management</h1>
                <button class="btn btn-primary" onclick="showAddModal()">Add New Teacher</button>
            </header>
            <div class="table-container">
                <table>
                    <thead><tr><th>Employee ID</th><th>Name</th><th>Email</th><th>Department</th><th>Actions</th></tr></thead>
                    <tbody id="teachersList"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div id="teacherModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Add Teacher</h2>
            <form id="teacherForm">
                <input type="text" id="name" placeholder="Full Name" required><br><br>
                <input type="email" id="email" placeholder="Email" required><br><br>
                <input type="password" id="password" placeholder="Password" required><br><br>
                <input type="text" id="employeeId" placeholder="Employee ID" required><br><br>
                <select id="department" required>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Electronics">Electronics</option>
                </select><br><br>
                <button type="submit" class="btn btn-primary">Save</button>
            </form>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
    <script>
        const token = localStorage.getItem('token');
        
        async function loadTeachers() {
            const res = await fetch('http://localhost:5000/api/teachers', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const teachers = await res.json();
            const tbody = document.getElementById('teachersList');
            tbody.innerHTML = teachers.map(t => `
                <tr>
                    <td>${t.employeeId}</td>
                    <td>${t.userId?.name}</td>
                    <td>${t.userId?.email}</td>
                    <td>${t.department}</td>
                    <td><button class="btn btn-sm btn-danger" onclick="deleteTeacher('${t._id}')">Delete</button></td>
                </tr>
            `).join('');
        }
        
        async function deleteTeacher(id) {
            if(confirm('Delete?')) {
                await fetch(`http://localhost:5000/api/teachers/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                loadTeachers();
            }
        }
        
        function showAddModal() {
            document.getElementById('teacherModal').style.display = 'block';
        }
        
        function closeModal() {
            document.getElementById('teacherModal').style.display = 'none';
        }
        
        document.getElementById('teacherForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                employeeId: document.getElementById('employeeId').value,
                department: document.getElementById('department').value
            };
            await fetch('http://localhost:5000/api/teachers', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(data)
            });
            closeModal();
            loadTeachers();
        });
        
        loadTeachers();
    </script>
</body>
</html>
